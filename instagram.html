  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    .page-content { padding: 0 1.1rem 3rem; }
    .page-title { font-family: "DM Serif Display", serif; font-size: 24px; color: var(--text); padding: 1.25rem 0 1rem; }
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #162715;
      --green-mid: #2e4a2c;
      --green-light: rgba(22,39,21,0.06);
      --green-border: rgba(22,39,21,0.15);
      --green-border-strong: rgba(22,39,21,0.25);
      --text: #162715;
      --muted: rgba(22,39,21,0.48);
      --bg: #ffffff;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 420px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 6rem;
    }

    /* Header */
    .header {
      position: sticky; top: 0;
      background: var(--bg);
      z-index: 5;
      border-bottom: 0.5px solid var(--green-border-strong);
      padding: 1rem 1rem 0.75rem;
    }
    .header-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--green); }
    .nav-links { display: flex; gap: 6px; }
    .nav-link {
      font-size: 12px; color: var(--muted);
      border: 0.5px solid var(--green-border);
      border-radius: 99px; padding: 4px 12px;
      text-decoration: none; cursor: pointer;
    }
    .nav-link.active { background: var(--green); color: #fff; border-color: var(--green); }
    .user-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); cursor: pointer;
      border: 0.5px solid var(--green-border);
      border-radius: 99px; padding: 4px 10px 4px 4px;
    }
    .user-pill:hover { background: var(--green-light); }
    .user-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--green); color: #fff;
      font-size: 9px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
    }

    /* View toggle */
    .view-toggle {
      display: flex; gap: 4px;
      background: var(--green-light);
      border-radius: 8px; padding: 3px;
    }
    .vt-btn {
      flex: 1; padding: 5px 0;
      border: none; background: none; cursor: pointer;
      border-radius: 6px; font-size: 12px;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .vt-btn.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--green-border); }

    /* Grid view */
    .grid-view { padding: 0.75rem 1rem; }
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .month-label { font-size: 16px; font-weight: 500; color: var(--text); }
    .nav-btn {
      background: none; border: 0.5px solid var(--green-border-strong);
      border-radius: 6px; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); font-size: 14px;
    }
    .nav-btn:hover { background: var(--green-light); }
    .posts-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
    }
    .grid-cell {
      aspect-ratio: 1;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: var(--green-light);
      border: 0.5px solid var(--green-border);
    }
    .grid-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .grid-cell .cell-overlay {
      position: absolute; inset: 0;
      background: rgba(22,39,21,0.45);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s;
    }
    .grid-cell:hover .cell-overlay { opacity: 1; }
    .cell-date { font-size: 10px; color: #fff; font-weight: 500; }
    .grid-cell.empty-cell {
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 10px;
      flex-direction: column; gap: 4px;
      cursor: default;
    }
    .grid-cell.empty-cell i { font-size: 18px; color: var(--green-border-strong); }
    .status-dot {
      position: absolute; top: 5px; right: 5px;
      width: 8px; height: 8px; border-radius: 50%;
      border: 1.5px solid #fff;
    }
    .dot-planned { background: #4a7a47; }
    .dot-ready { background: #162715; }
    .dot-published { background: #7a5c2e; }

    /* List view */
    .list-view { padding: 0 1rem; }
    .list-month-header {
      font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      padding: 1rem 0 0.5rem;
    }
    .post-card {
      background: var(--bg);
      border: 0.5px solid var(--green-border);
      border-radius: 10px;
      padding: 0.75rem;
      display: flex; gap: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .post-card:hover { border-color: var(--green-border-strong); background: var(--green-light); }
    .post-thumb {
      width: 52px; height: 52px; border-radius: 6px;
      object-fit: cover; flex-shrink: 0;
      background: var(--green-light); border: 0.5px solid var(--green-border);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 18px;
    }
    .post-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
    .post-body { flex: 1; min-width: 0; }
    .post-title {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .post-caption {
      font-size: 11px; color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .post-meta {
      display: flex; align-items: center; gap: 6px;
      margin-top: 5px; font-size: 11px; color: var(--muted);
    }
    .status-badge {
      font-size: 10px; padding: 1px 7px;
      border-radius: 99px; font-weight: 500;
    }
    .badge-planned { background: rgba(74,122,71,0.12); color: #2e4a2c; }
    .badge-ready { background: rgba(22,39,21,0.1); color: #162715; }
    .badge-published { background: rgba(122,92,46,0.12); color: #7a5c2e; }
    .post-av {
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 7px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0;
    }
    .av-g { background: #2e4a2c; }
    .av-a { background: #4a7a47; }
    .av-k { background: #7a5c2e; }

    .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 3rem 0; }

    /* FAB */
    .fab {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 0 22px; height: 44px;
      background: var(--green); color: #fff; border: none; border-radius: 99px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      white-space: nowrap; transition: background 0.15s;
    }
    .fab:hover { background: var(--green-mid); }

    /* Modal */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(22,39,21,0.4); z-index:400;
      align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--bg); border-radius: 20px 20px 0 0;
      padding: 1.25rem 1.25rem 2.5rem; width: 100%; max-width: 420px;
      border-top: 0.5px solid var(--green-border-strong);
      max-height: 90dvh; overflow-y: auto;
    }
    .modal-handle {
      width: 36px; height: 4px; background: var(--green-border-strong);
      border-radius: 99px; margin: 0 auto 1rem;
    }
    .modal-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 1.1rem; }
    .form-row { margin-bottom: 0.85rem; }
    .form-label {
      display: block; font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
    }
    .form-input {
      width: 100%; padding: 9px 11px; font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      border: 0.5px solid var(--green-border-strong);
      border-radius: 8px; background: var(--bg); color: var(--text); outline: none;
    }
    .form-input:focus { border-color: var(--green); }
    textarea.form-input { resize: vertical; min-height: 80px; line-height: 1.5; }
    select.form-input { cursor: pointer; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .members-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .m-opt {
      border: 0.5px solid var(--green-border-strong); border-radius: 8px;
      padding: 7px 6px; display: flex; flex-direction: column;
      align-items: center; gap: 5px; cursor: pointer;
      font-size: 11px; color: var(--muted); transition: all 0.12s;
    }
    .m-opt.sel { border-color: var(--green); background: var(--green-light); color: var(--text); font-weight: 500; }
    .m-opt .m-av { width: 26px; height: 26px; border-radius: 50%; font-size: 10px; font-weight: 500; display: flex; align-items: center; justify-content: center; color: #fff; }

    /* Image upload */
    .upload-zone {
      border: 1px dashed var(--green-border-strong);
      border-radius: 8px; padding: 1.5rem;
      text-align: center; cursor: pointer;
      transition: background 0.12s; position: relative;
    }
    .upload-zone:hover { background: var(--green-light); }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-zone i { font-size: 24px; color: var(--muted); display: block; margin-bottom: 6px; }
    .upload-zone p { font-size: 12px; color: var(--muted); }
    .photos-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .photo-thumb { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-thumb .remove-img { position: absolute; top: 3px; right: 3px; background: rgba(22,39,21,0.7); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .add-more-btn { width: 80px; height: 80px; border-radius: 8px; border: 1px dashed var(--green-border-strong); background: none; cursor: pointer; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
    .add-more-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .add-more-btn i { font-size: 18px; color: var(--muted); }
    .add-more-btn span { font-size: 10px; color: var(--muted); }
    .img-carousel { position: relative; width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden; margin-bottom: 1rem; background: var(--green-light); }
    .img-carousel img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .img-carousel img.active { display: block; }
    .carousel-nav { position: absolute; bottom: 8px; left: 0; right: 0; display: flex; justify-content: center; gap: 4px; }
    .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); border: none; cursor: pointer; padding: 0; }
    .carousel-dot.active { background: #fff; }
    .carousel-prev, .carousel-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(22,39,21,0.5); color: #fff; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .carousel-prev { left: 8px; }
    .carousel-next { right: 8px; }
    .photo-count { position: absolute; top: 8px; right: 8px; background: rgba(22,39,21,0.6); color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 99px; }

    .modal-actions { display: flex; gap: 8px; margin-top: 1.1rem; }
    .btn-cancel {
      flex: 1; padding: 10px;
      border: 0.5px solid var(--green-border-strong); border-radius: 8px;
      background: none; cursor: pointer; font-size: 13px;
      font-family: 'DM Sans', sans-serif; color: var(--muted);
    }
    .btn-save {
      flex: 2; padding: 10px; border: none; border-radius: 8px;
      background: var(--green); color: #fff; cursor: pointer;
      font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    }

    /* Detail modal */
    .detail-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; margin-bottom: 1rem; background: var(--green-light); display: flex; align-items: center; justify-content: center; }
    .detail-img i { font-size: 40px; color: var(--green-border-strong); }
    .detail-status { display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 99px; margin-bottom: 0.6rem; font-weight: 500; }
    .detail-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 0.75rem; }
    .detail-caption { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; white-space: pre-wrap; }
    .detail-row { display: flex; align-items: center; gap: 8px; margin-bottom: 0.5rem; font-size: 13px; color: var(--text); }
    .detail-row i { font-size: 15px; color: var(--muted); flex-shrink: 0; }
    .detail-members { display: flex; gap: 8px; flex-wrap: wrap; }
    .detail-member { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .del-btn {
      margin-top: 1rem; width: 100%; padding: 10px;
      border: 0.5px solid rgba(192,57,43,0.3); border-radius: 8px;
      background: none; color: #c0392b; font-size: 13px;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
    }
    .del-btn:hover { background: rgba(192,57,43,0.05); }
    .loading { text-align: center; color: var(--muted); font-size: 13px; padding: 3rem 0; }

    /* Copy caption btn */
    .copy-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
      border: 0.5px solid var(--green-border-strong);
      border-radius: 8px; padding: 7px 12px;
      background: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
      margin-top: 0.5rem; width: 100%; justify-content: center;
    }
    .copy-btn:hover { background: var(--green-light); }
    .copy-btn.copied { color: #2e4a2c; border-color: #2e4a2c; }
  
  </style>
</head>
<body>
<script src="firebase-config.js"></script>
<script src="shell.js"></script>
<script>injectShell("instagram");</script>
<div class="page-content">
<div class="page-title">Instagram</div>
<span id="user-name">…</span>
      <i class="ti ti-logout" style="font-size:13px"></i>
    </div>
  </div>
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem;">
    
  </div>
  <div class="view-toggle">
    <button class="vt-btn active" id="vt-grid" onclick="setView('grid')">
      <i class="ti ti-layout-grid"></i> Grille
    </button>
    <button class="vt-btn" id="vt-list" onclick="setView('list')">
      <i class="ti ti-list"></i> Liste
    </button>
  </div>
</div>

<!-- Grid view -->
<div id="view-grid">
  <div class="grid-view">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="month-label" id="grid-month-label"></span>
      <button class="nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="posts-grid" id="posts-grid"></div>
  </div>
</div>

<!-- List view -->
<div id="view-list" style="display:none;">
  <div class="list-view" id="list-view-content">
    <div class="loading">Chargement…</div>
  </div>
</div>

<button class="fab" onclick="openAddModal()">
  <i class="ti ti-plus"></i> Nouveau post
</button>

<!-- Add modal -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="modal-title">Nouveau post</p>

    <div class="form-row">
      <label class="form-label">Visuels <span style="color:var(--muted);font-size:10px;">jusqu'à 10 photos</span></label>
      <div id="photos-container">
        <div class="upload-zone" id="upload-zone">
          <input type="file" accept="image/*" multiple id="img-input" onchange="handleImages(this)">
          <i class="ti ti-photo-up"></i>
          <p>Appuie pour choisir une ou plusieurs photos</p>
        </div>
        <div class="photos-grid" id="photos-grid" style="display:none;"></div>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Titre du post</label>
      <input type="text" class="form-input" id="post-title" placeholder="Ex : Rolex Daytona 1965">
    </div>

    <div class="form-row">
      <label class="form-label">Caption Instagram</label>
      <textarea class="form-input" id="post-caption" placeholder="Tape ou colle ta caption ici…"></textarea>
    </div>

    <div class="form-row two-col">
      <div>
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="post-date">
      </div>
      <div>
        <label class="form-label">Heure</label>
        <input type="time" class="form-input" id="post-time" value="09:00">
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Statut</label>
      <select class="form-input" id="post-status">
        <option value="planned">En cours de préparation</option>
        <option value="ready">Prêt à publier</option>
        <option value="published">Publié</option>
      </select>
    </div>

    <div class="form-row">
      <label class="form-label">Responsable</label>
      <div class="members-grid">
        <div class="m-opt" data-m="Guillaume" onclick="toggleMember(this)">
          <div class="m-av av-g">GU</div><span>Guillaume</span>
        </div>
        <div class="m-opt" data-m="Arthur" onclick="toggleMember(this)">
          <div class="m-av av-a">AR</div><span>Arthur</span>
        </div>
        <div class="m-opt" data-m="Kim" onclick="toggleMember(this)">
          <div class="m-av av-k">KI</div><span>Kim</span>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Annuler</button>
      <button class="btn-save" onclick="savePost()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="overlay" id="detail-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="d-img-wrap"></div>
    <div class="detail-status" id="d-status"></div>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-caption" id="d-caption"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyCaption()">
      <i class="ti ti-copy" style="font-size:13px"></i> Copier la caption
    </button>
    <div style="height:0.75rem;"></div>
    <div class="detail-row"><i class="ti ti-calendar"></i><span id="d-date"></span></div>
    <div class="detail-row"><i class="ti ti-clock"></i><span id="d-time"></span></div>
    <div class="detail-row" style="align-items:flex-start;">
      <i class="ti ti-users"></i>
      <div class="detail-members" id="d-members"></div>
    </div>
    <button class="del-btn" onclick="deletePost()"><i class="ti ti-trash" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>Supprimer le post</button>
    <div class="modal-actions" style="margin-top:0.75rem;">
      <button class="btn-cancel" onclick="closeDetailModal()">Fermer</button>
      <button class="btn-save" onclick="editPost()">Modifier</button>
    </div>
  </div>
</div>

<script type="module">
  import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getStorage, ref as sRef, uploadString, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const MONTHS_FR=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
  const MM={Guillaume:{av:'av-g',initials:'GU'},Arthur:{av:'av-a',initials:'AR'},Kim:{av:'av-k',initials:'KI'}};
  const STATUS={planned:{label:'En préparation',cls:'badge-planned',dot:'dot-planned'},ready:{label:'Prêt à publier',cls:'badge-ready',dot:'dot-ready'},published:{label:'Publié',cls:'badge-published',dot:'dot-published'}};

  let currentDate=new Date();currentDate.setDate(1);
  let posts={},currentView='grid',selectedMembers=new Set(),imagesBase64=[],editingId=null,detailId=null;

  function renderPhotoGrid(){const grid=document.getElementById('photos-grid');const zone=document.getElementById('upload-zone');if(imagesBase64.length===0){zone.style.display='block';grid.style.display='none';grid.innerHTML='';return;}zone.style.display='none';grid.style.display='flex';grid.innerHTML='';imagesBase64.forEach((b64,i)=>{const thumb=document.createElement('div');thumb.className='photo-thumb';thumb.innerHTML=`<img src="${b64}" alt="photo ${i+1}"><button class="remove-img" onclick="removeImage(${i})"><i class="ti ti-x"></i></button>`;grid.appendChild(thumb);});if(imagesBase64.length<10){const addBtn=document.createElement('button');addBtn.className='add-more-btn';addBtn.type='button';addBtn.innerHTML=`<input type="file" accept="image/*" multiple onchange="handleImages(this)"><i class="ti ti-plus"></i><span>Ajouter</span>`;grid.appendChild(addBtn);}}

  window.handleImages=(input)=>{Array.from(input.files).forEach(file=>{if(imagesBase64.length>=10)return;const r=new FileReader();r.onload=e=>{imagesBase64.push(e.target.result);renderPhotoGrid();};r.readAsDataURL(file);});input.value='';};
  window.removeImage=(i)=>{imagesBase64.splice(i,1);renderPhotoGrid();};

  initAuth((app) => {
    const db=getDatabase(app);
    const storage=getStorage(app);
    onValue(ref(db,'posts'),snap=>{posts=snap.val()||{};render();});

    function render(){if(currentView==='grid')renderGrid();else renderList();}

    function renderGrid(){
      const y=currentDate.getFullYear(),m=currentDate.getMonth();
      document.getElementById('grid-month-label').textContent=MONTHS[m]+' '+y;
      const grid=document.getElementById('posts-grid');grid.innerHTML='';
      const dim=new Date(y,m+1,0).getDate();
      const filtered=Object.entries(posts);
      for(let d=1;d<=dim;d++){
        const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayPosts=filtered.filter(([,p])=>p.date===ds);
        if(!dayPosts.length){const cell=document.createElement('div');cell.className='grid-cell empty-cell';cell.innerHTML=`<i class="ti ti-calendar" aria-hidden="true"></i><span style="font-size:9px">${d}</span>`;grid.appendChild(cell);}
        else dayPosts.forEach(([id,p])=>{const cell=document.createElement('div');cell.className='grid-cell';const st=STATUS[p.status]||STATUS.planned;const imgUrl=(p.imageUrls||[])[0]||p.imageUrl;if(imgUrl){cell.innerHTML=`<img src="${imgUrl}" alt="${p.title}" loading="lazy"><div class="status-dot ${st.dot}"></div><div class="cell-overlay"><span class="cell-date">${d} — ${p.time||''}</span></div>`;}else{cell.innerHTML=`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;"><i class="ti ti-photo" style="font-size:20px;color:var(--muted)"></i><span style="font-size:9px;color:var(--muted)">${d}</span></div><div class="status-dot ${st.dot}"></div><div class="cell-overlay"><span class="cell-date">${p.title}</span></div>`;}cell.onclick=()=>openDetail(id);grid.appendChild(cell);});
      }
    }

    function renderList(){
      const container=document.getElementById('list-view-content');
      const sorted=Object.entries(posts).sort((a,b)=>(a[1].date+a[1].time).localeCompare(b[1].date+b[1].time));
      if(!sorted.length){container.innerHTML='<div class="empty">Aucun post planifié</div>';return;}
      const groups={};
      sorted.forEach(([id,p])=>{const d=new Date(p.date+'T12:00');const key=`${d.getFullYear()}-${d.getMonth()}`;if(!groups[key])groups[key]={label:MONTHS[d.getMonth()]+' '+d.getFullYear(),items:[]};groups[key].items.push([id,p]);});
      container.innerHTML='';
      Object.values(groups).forEach(g=>{
        const hdr=document.createElement('div');hdr.className='list-month-header';hdr.textContent=g.label;container.appendChild(hdr);
        g.items.forEach(([id,p])=>{const st=STATUS[p.status]||STATUS.planned;const ms=p.members||[];const avs=ms.map(m=>MM[m]?`<div class="post-av ${MM[m].av}">${MM[m].initials}</div>`:'').join('');const ds=new Date(p.date+'T12:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});const imgUrl=(p.imageUrls||[])[0]||p.imageUrl;const card=document.createElement('div');card.className='post-card';card.onclick=()=>openDetail(id);card.innerHTML=`<div class="post-thumb">${imgUrl?`<img src="${imgUrl}" alt="${p.title}">`:`<i class="ti ti-photo"></i>`}</div><div class="post-body"><div class="post-title">${p.title}</div><div class="post-caption">${p.caption||'Pas de caption'}</div><div class="post-meta"><span class="status-badge ${st.cls}">${st.label}</span><i class="ti ti-calendar" style="font-size:11px"></i>${ds} ${p.time}${avs}</div></div>`;container.appendChild(card);});
      });
    }

    window.setView=(v)=>{currentView=v;document.getElementById('view-grid').style.display=v==='grid'?'block':'none';document.getElementById('view-list').style.display=v==='list'?'block':'none';document.getElementById('vt-grid').classList.toggle('active',v==='grid');document.getElementById('vt-list').classList.toggle('active',v==='list');render();};
    window.changeMonth=(dir)=>{currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+dir,1);render();};

    window.openAddModal=()=>{editingId=null;selectedMembers=new Set();imagesBase64=[];document.getElementById('modal-title').textContent='Nouveau post';document.getElementById('post-title').value='';document.getElementById('post-caption').value='';document.getElementById('post-date').value=new Date().toISOString().split('T')[0];document.getElementById('post-time').value='09:00';document.getElementById('post-status').value='planned';document.querySelectorAll('.m-opt').forEach(o=>o.classList.remove('sel'));renderPhotoGrid();document.getElementById('add-overlay').classList.add('open');};
    window.closeAddModal=()=>document.getElementById('add-overlay').classList.remove('open');
    window.toggleMember=(el)=>{const m=el.dataset.m;if(selectedMembers.has(m)){selectedMembers.delete(m);el.classList.remove('sel');}else{selectedMembers.add(m);el.classList.add('sel');}};

    window.savePost=async()=>{
      const title=document.getElementById('post-title').value.trim();
      const caption=document.getElementById('post-caption').value.trim();
      const date=document.getElementById('post-date').value;
      const time=document.getElementById('post-time').value;
      const status=document.getElementById('post-status').value;
      if(!title||!date||selectedMembers.size===0){alert('Remplis le titre, la date et sélectionne au moins un responsable.');return;}
      let imageUrls=editingId?(posts[editingId]?.imageUrls||[]):[];
      if(imagesBase64.length>0){imageUrls=[];for(const b64 of imagesBase64){const ir=sRef(storage,`posts/${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`);await uploadString(ir,b64,'data_url');imageUrls.push(await getDownloadURL(ir));}}
      const payload={title,caption,date,time,status,members:[...selectedMembers],imageUrls,imageUrl:imageUrls[0]||null};
      if(editingId)await set(ref(db,'posts/'+editingId),payload);else await push(ref(db,'posts'),payload);
      closeAddModal();
    };

    window.openDetail=(id)=>{detailId=id;const p=posts[id];if(!p)return;const st=STATUS[p.status]||STATUS.planned;const urls=(p.imageUrls||[]).filter(Boolean)||(p.imageUrl?[p.imageUrl]:[]);const imgWrap=document.getElementById('d-img-wrap');if(urls.length>0){const imgs=urls.map((u,i)=>`<img src="${u}" alt="photo ${i+1}" class="${i===0?'active':''}">`).join('');const dots=urls.length>1?`<div class="carousel-nav">${urls.map((_,i)=>`<button class="carousel-dot ${i===0?'active':''}" onclick="goSlide(${i})"></button>`).join('')}</div>`:'';const arrows=urls.length>1?`<button class="carousel-prev" onclick="goSlide(-1,true)"><i class="ti ti-chevron-left"></i></button><button class="carousel-next" onclick="goSlide(1,true)"><i class="ti ti-chevron-right"></i></button>`:'';const count=urls.length>1?`<div class="photo-count">${urls.length} photos</div>`:'';imgWrap.innerHTML=`<div class="img-carousel" id="carousel">${imgs}${dots}${arrows}${count}</div>`;window._carouselIdx=0;window._carouselLen=urls.length;}else{imgWrap.innerHTML=`<div style="width:100%;aspect-ratio:1;background:var(--green-light);border-radius:10px;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;"><i class="ti ti-photo" style="font-size:40px;color:var(--green-border-strong)"></i></div>`;}const statusEl=document.getElementById('d-status');statusEl.textContent=st.label;statusEl.className=`detail-status ${st.cls}`;document.getElementById('d-title').textContent=p.title;document.getElementById('d-caption').textContent=p.caption||'Pas de caption';document.getElementById('d-date').textContent=new Date(p.date+'T12:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});document.getElementById('d-time').textContent=p.time;document.getElementById('d-members').innerHTML=(p.members||[]).map(m=>MM[m]?`<div class="detail-member"><div class="post-av ${MM[m].av}" style="width:22px;height:22px;font-size:9px;">${MM[m].initials}</div>${m}</div>`:'').join('');const copyBtn=document.getElementById('copy-btn');copyBtn.classList.remove('copied');copyBtn.innerHTML=`<i class="ti ti-copy" style="font-size:13px"></i> Copier la caption`;document.getElementById('detail-overlay').classList.add('open');};
    window.closeDetailModal=()=>document.getElementById('detail-overlay').classList.remove('open');
    window.copyCaption=()=>{const caption=posts[detailId]?.caption||'';navigator.clipboard.writeText(caption).then(()=>{const btn=document.getElementById('copy-btn');btn.classList.add('copied');btn.innerHTML=`<i class="ti ti-check" style="font-size:13px"></i> Copié !`;setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML=`<i class="ti ti-copy" style="font-size:13px"></i> Copier la caption`;},2000);});};
    window.goSlide=(idx,relative)=>{const imgs=document.querySelectorAll('#carousel img');const dots=document.querySelectorAll('#carousel .carousel-dot');if(!imgs.length)return;if(relative){window._carouselIdx=(window._carouselIdx+idx+window._carouselLen)%window._carouselLen;}else{window._carouselIdx=idx;}imgs.forEach((img,i)=>img.classList.toggle('active',i===window._carouselIdx));dots.forEach((dot,i)=>dot.classList.toggle('active',i===window._carouselIdx));};
    window.deletePost=async()=>{if(!detailId||!confirm('Supprimer ce post ?'))return;const p=posts[detailId];for(const url of(p?.imageUrls||[])){try{await deleteObject(sRef(storage,url));}catch(e){}}await remove(ref(db,'posts/'+detailId));closeDetailModal();};
    window.editPost=()=>{if(!detailId)return;const p=posts[detailId];editingId=detailId;selectedMembers=new Set(p.members||[]);imagesBase64=[];document.getElementById('modal-title').textContent="Modifier le post";document.getElementById('post-title').value=p.title;document.getElementById('post-caption').value=p.caption||'';document.getElementById('post-date').value=p.date;document.getElementById('post-time').value=p.time;document.getElementById('post-status').value=p.status;document.querySelectorAll('.m-opt').forEach(o=>o.classList.toggle('sel',selectedMembers.has(o.dataset.m)));renderPhotoGrid();closeDetailModal();document.getElementById('add-overlay').classList.add('open');};
  });
</script>
</div>
</body>
</html>
