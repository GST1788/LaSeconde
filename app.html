<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendrier — Horologio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #162715;
      --green-mid: #2e4a2c;
      --green-accent: #4a7a47;
      --green-light: rgba(22,39,21,0.06);
      --green-border: rgba(22,39,21,0.15);
      --green-border-strong: rgba(22,39,21,0.25);
      --text: #162715;
      --muted: rgba(22,39,21,0.48);
      --bg: #ffffff;
      --surface: #f9f9f7;
    }

    /* Member colors */
    --c-g-bg: #dce8db; --c-g-text: #162715;
    --c-a-bg: #c9dfc8; --c-a-text: #162715;
    --c-k-bg: #b0d1af; --c-k-text: #162715;

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 420px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 6rem;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 5;
      border-bottom: 0.5px solid var(--green-border-strong);
      padding: 1rem 1rem 0.75rem;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--green);
    }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      border: 0.5px solid var(--green-border);
      border-radius: 99px;
      padding: 4px 10px 4px 4px;
    }
    .user-pill:hover { background: var(--green-light); }
    .user-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--green); color: #fff;
      font-size: 9px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
    }

    /* Month nav */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.8rem;
    }
    .month-label {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
    }
    .nav-btn {
      background: none;
      border: 0.5px solid var(--green-border-strong);
      border-radius: 6px;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
    }
    .nav-btn:hover { background: var(--green-light); }

    /* Member filter chips */
    .filter-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .chip {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 9px 3px 3px;
      border-radius: 99px;
      border: 0.5px solid var(--green-border-strong);
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      transition: all 0.12s;
    }
    .chip.active { background: var(--green); border-color: var(--green); color: #fff; }
    .chip-av {
      width: 20px; height: 20px; border-radius: 50%;
      font-size: 8px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
    }
    .av-g { background: #2e4a2c; color: #fff; }
    .av-a { background: #4a7a47; color: #fff; }
    .av-k { background: #7a5c2e; color: #fff; }
    .av-all { background: rgba(22,39,21,0.12); color: var(--green); }

    /* ── Calendar grid ── */
    .calendar { padding: 0.75rem 1rem 0; }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .wday {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-align: center;
      padding: 3px 0;
      text-transform: uppercase;
    }
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .day-cell {
      min-height: 48px;
      border-radius: 6px;
      padding: 4px 3px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .day-cell:hover { background: var(--green-light); }
    .day-cell.other-month .day-num { color: var(--muted); opacity: 0.4; }
    .day-num {
      font-size: 12px;
      color: var(--text);
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .day-cell.today .day-num {
      background: var(--green);
      color: #fff;
      font-weight: 500;
    }
    .dots {
      display: flex; gap: 2px; flex-wrap: wrap;
      margin-top: 2px; padding-left: 2px;
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; }
    .dot-g { background: #2e4a2c; }
    .dot-a { background: #4a7a47; }
    .dot-k { background: #7a5c2e; }

    /* ── Events list ── */
    .section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 1rem;
      margin: 1rem 0 0.5rem;
    }
    .events-list {
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .event-card {
      background: var(--bg);
      border: 0.5px solid var(--green-border);
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .event-card:hover { border-color: var(--green-border-strong); background: var(--green-light); }
    .event-bar { width: 3px; border-radius: 99px; align-self: stretch; min-height: 28px; flex-shrink: 0; }
    .bar-g { background: #2e4a2c; }
    .bar-a { background: #4a7a47; }
    .bar-k { background: #7a5c2e; }
    .bar-multi { background: linear-gradient(180deg, #2e4a2c 33%, #4a7a47 33% 66%, #7a5c2e 66%); }
    .event-body { flex: 1; min-width: 0; }
    .event-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .type-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 99px;
      border: 0.5px solid var(--green-border-strong);
      color: var(--muted);
    }
    .event-avatars {
      display: flex;
      gap: -4px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .ev-av {
      width: 20px; height: 20px; border-radius: 50%;
      font-size: 8px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--bg);
      margin-left: -4px;
      color: #fff;
    }
    .ev-av:first-child { margin-left: 0; }
    .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 2rem 0; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0 22px;
      height: 44px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 99px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .fab:hover { background: var(--green-mid); }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(22,39,21,0.4);
      z-index: 20;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--bg);
      border-radius: 20px 20px 0 0;
      padding: 1.25rem 1.25rem 2.5rem;
      width: 100%;
      max-width: 420px;
      border-top: 0.5px solid var(--green-border-strong);
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--green-border-strong);
      border-radius: 99px;
      margin: 0 auto 1rem;
    }
    .modal-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 1.1rem;
    }
    .form-row { margin-bottom: 0.85rem; }
    .form-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .form-input {
      width: 100%;
      padding: 9px 11px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      border: 0.5px solid var(--green-border-strong);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .form-input:focus { border-color: var(--green); }
    select.form-input { cursor: pointer; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .members-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .m-opt {
      border: 0.5px solid var(--green-border-strong);
      border-radius: 8px;
      padding: 7px 6px;
      display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      transition: all 0.12s;
    }
    .m-opt.sel {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--text);
      font-weight: 500;
    }
    .m-opt .chip-av { width: 26px; height: 26px; font-size: 10px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 1.1rem; }
    .btn-cancel {
      flex: 1; padding: 10px;
      border: 0.5px solid var(--green-border-strong);
      border-radius: 8px; background: none;
      cursor: pointer; font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
    }
    .btn-save {
      flex: 2; padding: 10px;
      border: none; border-radius: 8px;
      background: var(--green); color: #fff;
      cursor: pointer; font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Detail modal ── */
    .detail-modal { padding-bottom: 2rem; }
    .detail-type {
      display: inline-block;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 99px;
      border: 0.5px solid var(--green-border-strong);
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .detail-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .detail-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.6rem;
      font-size: 13px;
      color: var(--text);
    }
    .detail-row i { font-size: 16px; color: var(--muted); flex-shrink: 0; }
    .detail-members { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .detail-member {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text);
    }
    .del-btn {
      margin-top: 1.25rem;
      width: 100%; padding: 10px;
      border: 0.5px solid rgba(192,57,43,0.3);
      border-radius: 8px;
      background: none;
      color: #c0392b;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }
    .del-btn:hover { background: rgba(192,57,43,0.05); }

    .loading {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 3rem 0;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <span class="logo">Horologio</span>
    <div class="user-pill" id="user-pill" onclick="handleLogout()">
      <div class="user-avatar" id="user-initials">?</div>
      <span id="user-name">…</span>
      <i class="ti ti-logout" style="font-size:13px"></i>
    </div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
    <span class="month-label" id="month-label"></span>
    <button class="nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
  </div>
  <div class="filter-row">
    <div class="chip active" data-f="all" onclick="setFilter(this,'all')">
      <div class="chip-av av-all"><i class="ti ti-users" style="font-size:10px"></i></div>
      <span>Tous</span>
    </div>
    <div class="chip" data-f="Guillaume" onclick="setFilter(this,'Guillaume')">
      <div class="chip-av av-g">GU</div><span>Guillaume</span>
    </div>
    <div class="chip" data-f="Arthur" onclick="setFilter(this,'Arthur')">
      <div class="chip-av av-a">AR</div><span>Arthur</span>
    </div>
    <div class="chip" data-f="Kim" onclick="setFilter(this,'Kim')">
      <div class="chip-av av-k">KI</div><span>Kim</span>
    </div>
  </div>
</div>

<div class="calendar">
  <div class="weekdays">
    <div class="wday">L</div><div class="wday">M</div><div class="wday">M</div>
    <div class="wday">J</div><div class="wday">V</div><div class="wday">S</div><div class="wday">D</div>
  </div>
  <div class="days-grid" id="days-grid"></div>
</div>

<p class="section-label" id="section-label">Événements du mois</p>
<div class="events-list" id="events-list"><div class="loading">Chargement…</div></div>

<button class="fab" onclick="openAddModal()">
  <i class="ti ti-plus"></i> Ajouter
</button>

<!-- Add/Edit Modal -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="modal-title">Nouvel événement</p>

    <div class="form-row">
      <label class="form-label">Titre</label>
      <input type="text" class="form-input" id="ev-title" placeholder="Ex : Expertise Rolex Daytona">
    </div>

    <div class="form-row">
      <label class="form-label">Type</label>
      <select class="form-input" id="ev-type">
        <option value="Vente / Transaction">Vente / Transaction</option>
        <option value="Rendez-vous client">Rendez-vous client</option>
        <option value="Shooting / Contenu">Shooting / Contenu</option>
        <option value="Appel téléphonique">Appel téléphonique</option>
      </select>
    </div>

    <div class="form-row two-col">
      <div>
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="ev-date">
      </div>
      <div>
        <label class="form-label">Heure</label>
        <input type="time" class="form-input" id="ev-time" value="10:00">
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Note (optionnel)</label>
      <input type="text" class="form-input" id="ev-note" placeholder="Ex : Montre référence 1234…">
    </div>

    <div class="form-row">
      <label class="form-label">Participants</label>
      <div class="members-grid">
        <div class="m-opt" data-m="Guillaume" onclick="toggleMember(this)">
          <div class="chip-av av-g">GU</div>
          <span>Guillaume</span>
        </div>
        <div class="m-opt" data-m="Arthur" onclick="toggleMember(this)">
          <div class="chip-av av-a">AR</div>
          <span>Arthur</span>
        </div>
        <div class="m-opt" data-m="Kim" onclick="toggleMember(this)">
          <div class="chip-av av-k">KI</div>
          <span>Kim</span>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Annuler</button>
      <button class="btn-save" id="save-btn" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detail-overlay">
  <div class="modal detail-modal">
    <div class="modal-handle"></div>
    <div class="detail-type" id="d-type"></div>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-row"><i class="ti ti-calendar"></i><span id="d-date"></span></div>
    <div class="detail-row"><i class="ti ti-clock"></i><span id="d-time"></span></div>
    <div class="detail-row" id="d-note-row" style="display:none"><i class="ti ti-note"></i><span id="d-note"></span></div>
    <div class="detail-row" style="align-items:flex-start">
      <i class="ti ti-users"></i>
      <div class="detail-members" id="d-members"></div>
    </div>
    <button class="del-btn" onclick="deleteEvent()"><i class="ti ti-trash" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>Supprimer l'événement</button>
    <div class="modal-actions" style="margin-top:0.75rem">
      <button class="btn-cancel" onclick="closeDetailModal()">Fermer</button>
      <button class="btn-save" onclick="editEvent()">Modifier</button>
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // ── Auth guard ──
  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    const name = user.displayName || user.email.split("@")[0];
    document.getElementById("user-name").textContent = name;
    document.getElementById("user-initials").textContent = name.slice(0,2).toUpperCase();
    subscribeEvents();
  });

  window.handleLogout = async () => {
    await signOut(auth);
    window.location.href = "index.html";
  };

  // ── State ──
  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const MEMBER_META = {
    Guillaume: { av: 'av-g', dot: 'dot-g', bar: 'bar-g', initials: 'GU' },
    Arthur:    { av: 'av-a', dot: 'dot-a', bar: 'bar-a', initials: 'AR' },
    Kim:       { av: 'av-k', dot: 'dot-k', bar: 'bar-k', initials: 'KI' },
  };

  let currentDate = new Date();
  currentDate.setDate(1);
  let activeFilter = 'all';
  let events = {};
  let selectedMembers = new Set();
  let editingId = null;
  let detailId = null;

  // ── Firebase sync ──
  function subscribeEvents() {
    onValue(ref(db, 'events'), (snap) => {
      events = snap.val() || {};
      render();
    });
  }

  // ── Render ──
  function render() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('month-label').textContent = MONTHS[month] + ' ' + year;

    const today = new Date();
    let startDow = new Date(year, month, 1).getDay();
    if (startDow === 0) startDow = 7;
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const daysInPrev  = new Date(year, month, 0).getDate();

    const filtered = filterEvents();

    // Calendar grid
    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';

    for (let i = startDow - 1; i > 0; i--) {
      const cell = document.createElement('div');
      cell.className = 'day-cell other-month';
      cell.innerHTML = `<div class="day-num">${daysInPrev - i + 1}</div>`;
      grid.appendChild(cell);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvs = filtered.filter(([,e]) => e.date === ds);
      const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (isToday ? ' today' : '');

      const members = [...new Set(dayEvs.flatMap(([,e]) => e.members || []))];
      const dots = members.map(m => MEMBER_META[m] ? `<div class="dot ${MEMBER_META[m].dot}"></div>` : '').join('');
      cell.innerHTML = `<div class="day-num">${d}</div>${dots ? `<div class="dots">${dots}</div>` : ''}`;
      grid.appendChild(cell);
    }

    // Events list
    const list = document.getElementById('events-list');
    const monthEvs = filtered.filter(([,e]) => {
      const d = new Date(e.date);
      return d.getFullYear()===year && d.getMonth()===month;
    }).sort((a,b) => (a[1].date+a[1].time).localeCompare(b[1].date+b[1].time));

    document.getElementById('section-label').textContent =
      monthEvs.length ? `${monthEvs.length} événement${monthEvs.length>1?'s':''} ce mois` : 'Aucun événement';

    list.innerHTML = '';
    if (!monthEvs.length) {
      list.innerHTML = '<div class="empty">Aucun événement ce mois</div>';
      return;
    }
    monthEvs.forEach(([id, ev]) => {
      const members = ev.members || [];
      const barClass = members.length > 1 ? 'bar-multi' : (MEMBER_META[members[0]]?.bar || 'bar-g');
      const dateStr = new Date(ev.date + 'T12:00').toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'short' });
      const avatarsHtml = members.map(m => MEMBER_META[m] ? `<div class="ev-av ${MEMBER_META[m].av}">${MEMBER_META[m].initials}</div>` : '').join('');
      const card = document.createElement('div');
      card.className = 'event-card';
      card.onclick = () => openDetail(id);
      card.innerHTML = `
        <div class="event-bar ${barClass}"></div>
        <div class="event-body">
          <div class="event-title">${ev.title}</div>
          <div class="event-meta">
            <i class="ti ti-clock" style="font-size:11px"></i> ${ev.time} · ${dateStr}
            <span class="type-badge">${ev.type}</span>
          </div>
        </div>
        <div class="event-avatars">${avatarsHtml}</div>
      `;
      list.appendChild(card);
    });
  }

  function filterEvents() {
    return Object.entries(events).filter(([,e]) => {
      if (activeFilter === 'all') return true;
      return (e.members || []).includes(activeFilter);
    });
  }

  // ── Month nav & filter ──
  window.changeMonth = (dir) => {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
    render();
  };

  window.setFilter = (el, key) => {
    activeFilter = key;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    render();
  };

  // ── Add / Edit modal ──
  window.openAddModal = () => {
    editingId = null;
    selectedMembers = new Set();
    document.getElementById('modal-title').textContent = 'Nouvel événement';
    document.getElementById('ev-title').value = '';
    document.getElementById('ev-type').value = 'Rendez-vous client';
    document.getElementById('ev-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('ev-time').value = '10:00';
    document.getElementById('ev-note').value = '';
    document.querySelectorAll('.m-opt').forEach(o => o.classList.remove('sel'));
    document.getElementById('add-overlay').classList.add('open');
  };

  window.closeAddModal = () => document.getElementById('add-overlay').classList.remove('open');

  window.toggleMember = (el) => {
    const m = el.dataset.m;
    if (selectedMembers.has(m)) { selectedMembers.delete(m); el.classList.remove('sel'); }
    else { selectedMembers.add(m); el.classList.add('sel'); }
  };

  window.saveEvent = async () => {
    const title = document.getElementById('ev-title').value.trim();
    const type  = document.getElementById('ev-type').value;
    const date  = document.getElementById('ev-date').value;
    const time  = document.getElementById('ev-time').value;
    const note  = document.getElementById('ev-note').value.trim();
    if (!title || !date || selectedMembers.size === 0) {
      alert('Remplis le titre, la date et sélectionne au moins un participant.');
      return;
    }
    const payload = { title, type, date, time, note, members: [...selectedMembers] };
    if (editingId) {
      await set(ref(db, 'events/' + editingId), payload);
    } else {
      await push(ref(db, 'events'), payload);
    }
    closeAddModal();
  };

  // ── Detail modal ──
  window.openDetail = (id) => {
    detailId = id;
    const ev = events[id];
    if (!ev) return;
    document.getElementById('d-type').textContent = ev.type;
    document.getElementById('d-title').textContent = ev.title;
    const dateStr = new Date(ev.date + 'T12:00').toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    document.getElementById('d-date').textContent = dateStr;
    document.getElementById('d-time').textContent = ev.time;
    const noteRow = document.getElementById('d-note-row');
    if (ev.note) { document.getElementById('d-note').textContent = ev.note; noteRow.style.display = 'flex'; }
    else { noteRow.style.display = 'none'; }
    const membersEl = document.getElementById('d-members');
    membersEl.innerHTML = (ev.members || []).map(m => MEMBER_META[m]
      ? `<div class="detail-member"><div class="ev-av ${MEMBER_META[m].av}" style="width:24px;height:24px;font-size:9px;border:none;">${MEMBER_META[m].initials}</div>${m}</div>`
      : '').join('');
    document.getElementById('detail-overlay').classList.add('open');
  };

  window.closeDetailModal = () => document.getElementById('detail-overlay').classList.remove('open');

  window.deleteEvent = async () => {
    if (!detailId) return;
    if (!confirm('Supprimer cet événement ?')) return;
    await remove(ref(db, 'events/' + detailId));
    closeDetailModal();
  };

  window.editEvent = () => {
    if (!detailId) return;
    const ev = events[detailId];
    editingId = detailId;
    selectedMembers = new Set(ev.members || []);
    document.getElementById('modal-title').textContent = 'Modifier l\'événement';
    document.getElementById('ev-title').value = ev.title;
    document.getElementById('ev-type').value = ev.type;
    document.getElementById('ev-date').value = ev.date;
    document.getElementById('ev-time').value = ev.time;
    document.getElementById('ev-note').value = ev.note || '';
    document.querySelectorAll('.m-opt').forEach(o => {
      o.classList.toggle('sel', selectedMembers.has(o.dataset.m));
    });
    closeDetailModal();
    document.getElementById('add-overlay').classList.add('open');
  };
</script>
</body>
</html>
