  <meta name="theme-color" content="#162715">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    .page-content { padding: 0 1.1rem 3rem; }
    .page-title { font-family: "DM Serif Display", serif; font-size: 24px; color: var(--text); padding: 1.25rem 0 1rem; }
    
  .month-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; }
  .month-label { font-size:16px; font-weight:500; color:var(--text); }
  .nav-btn { background:none; border:0.5px solid var(--green-border-strong); border-radius:6px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text); font-size:14px; }
  .nav-btn:hover { background:var(--green-light); }
  .filter-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:.85rem; }
  .chip { display:flex; align-items:center; gap:5px; padding:3px 9px 3px 3px; border-radius:99px; border:0.5px solid var(--green-border-strong); background:transparent; cursor:pointer; font-size:12px; color:var(--muted); transition:all .12s; font-family:"DM Sans",sans-serif; }
  .chip.active { background:var(--green); border-color:var(--green); color:#fff; }
  .chip-av { width:20px; height:20px; border-radius:50%; font-size:8px; font-weight:500; display:flex; align-items:center; justify-content:center; }
  .av-g { background:#2e4a2c; color:#fff; } .av-a { background:#4a7a47; color:#fff; } .av-k { background:#7a5c2e; color:#fff; } .av-all { background:rgba(22,39,21,.12); color:var(--green); }
  .weekdays { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
  .wday { font-size:10px; letter-spacing:.08em; color:var(--muted); text-align:center; padding:3px 0; text-transform:uppercase; }
  .days-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:.75rem; }
  .day-cell { min-height:46px; border-radius:6px; padding:4px 3px; cursor:pointer; transition:background .1s; }
  .day-cell:hover { background:var(--green-light); }
  .day-cell.other-month .day-num { color:var(--muted); opacity:.35; }
  .day-num { font-size:12px; color:var(--text); width:22px; height:22px; display:flex; align-items:center; justify-content:center; border-radius:50%; }
  .day-cell.today .day-num { background:var(--green); color:#fff; font-weight:500; }
  .dots { display:flex; gap:2px; flex-wrap:wrap; margin-top:2px; padding-left:2px; }
  .dot { width:5px; height:5px; border-radius:50%; }
  .dot-g { background:#2e4a2c; } .dot-a { background:#4a7a47; } .dot-k { background:#7a5c2e; } .dot-insta { background:#c0607a; }
  .divider { height:0.5px; background:var(--green-border); margin:0 0 .75rem; }
  .section-label { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.5rem; }
  .events-list { display:flex; flex-direction:column; gap:8px; }
  .event-card { background:var(--bg); border:0.5px solid var(--green-border); border-radius:10px; padding:.7rem .9rem; display:flex; gap:10px; align-items:flex-start; cursor:pointer; transition:all .12s; }
  .event-card:hover { border-color:var(--green-border-strong); background:var(--green-light); }
  .event-bar { width:3px; border-radius:99px; align-self:stretch; min-height:28px; flex-shrink:0; }
  .bar-g { background:#2e4a2c; } .bar-a { background:#4a7a47; } .bar-k { background:#7a5c2e; } .bar-multi { background:linear-gradient(180deg,#2e4a2c 33%,#4a7a47 33% 66%,#7a5c2e 66%); }
  .event-body { flex:1; min-width:0; }
  .event-title { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .event-meta { font-size:11px; color:var(--muted); margin-top:3px; display:flex; align-items:center; gap:6px; }
  .type-badge { font-size:10px; padding:1px 6px; border-radius:99px; border:0.5px solid var(--green-border-strong); color:var(--muted); }
  .type-badge.insta { background:rgba(192,96,122,0.1); border-color:rgba(192,96,122,0.3); color:#c0607a; }
  .ev-avatars { display:flex; flex-shrink:0; margin-top:1px; }
  .ev-av { width:20px; height:20px; border-radius:50%; font-size:8px; font-weight:500; display:flex; align-items:center; justify-content:center; border:1.5px solid #fff; margin-left:-4px; color:#fff; }
  .ev-av:first-child { margin-left:0; }
  .empty { text-align:center; color:var(--muted); font-size:13px; padding:2rem 0; }
  .fab { position:fixed; bottom:calc(24px + env(safe-area-inset-bottom, 0px)); left:50%; transform:translateX(-50%); padding:0 22px; height:44px; background:var(--green); color:#fff; border:none; border-radius:99px; font-family:"DM Sans",sans-serif; font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:7px; white-space:nowrap; z-index:10; }
  .fab:hover { background:var(--green-mid); }
  .overlay { display:none; position:fixed; inset:0; background:rgba(22,39,21,.4); z-index:400; align-items:flex-end; justify-content:center; }
  .overlay.open { display:flex; }
  .modal { background:var(--bg); border-radius:20px 20px 0 0; padding:1.25rem 1.25rem calc(2.5rem + env(safe-area-inset-bottom,0px)); width:100%; max-width:430px; border-top:0.5px solid var(--green-border-strong); max-height:92dvh; overflow-y:auto; }
  .modal-handle { width:36px; height:4px; background:var(--green-border-strong); border-radius:99px; margin:0 auto 1rem; }
  .modal-title { font-size:15px; font-weight:500; color:var(--text); margin-bottom:1.1rem; }
  .form-row { margin-bottom:.85rem; }
  .form-label { display:block; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  .form-input { width:100%; padding:9px 11px; font-size:13px; font-family:"DM Sans",sans-serif; border:0.5px solid var(--green-border-strong); border-radius:8px; background:var(--bg); color:var(--text); outline:none; }
  .form-input:focus { border-color:var(--green); }
  select.form-input { cursor:pointer; }
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .members-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .m-opt { border:0.5px solid var(--green-border-strong); border-radius:8px; padding:7px 6px; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; font-size:11px; color:var(--muted); transition:all .12s; }
  .m-opt.sel { border-color:var(--green); background:var(--green-light); color:var(--text); font-weight:500; }
  .m-opt .m-av { width:26px; height:26px; border-radius:50%; font-size:10px; font-weight:500; display:flex; align-items:center; justify-content:center; color:#fff; }
  .modal-actions { display:flex; gap:8px; margin-top:1.1rem; }
  .btn-cancel { flex:1; padding:10px; border:0.5px solid var(--green-border-strong); border-radius:8px; background:none; cursor:pointer; font-size:13px; font-family:"DM Sans",sans-serif; color:var(--muted); }
  .btn-save { flex:2; padding:10px; border:none; border-radius:8px; background:var(--green); color:#fff; cursor:pointer; font-size:13px; font-weight:500; font-family:"DM Sans",sans-serif; }
  .del-btn { margin-top:1rem; width:100%; padding:10px; border:0.5px solid rgba(192,57,43,.3); border-radius:8px; background:none; color:#b94040; font-size:13px; font-family:"DM Sans",sans-serif; cursor:pointer; }

  </style>
</head>

<div class="overlay" id="add-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="modal-title">Nouvel événement</p>
    <div class="form-row"><label class="form-label">Titre</label><input type="text" class="form-input" id="ev-title" placeholder="Ex : Expertise Rolex Daytona"></div>
    <div class="form-row"><label class="form-label">Type</label><select class="form-input" id="ev-type"><option>Vente / Transaction</option><option>Rendez-vous client</option><option>Shooting / Contenu</option><option>Appel téléphonique</option></select></div>
    <div class="form-row two-col"><div><label class="form-label">Date</label><input type="date" class="form-input" id="ev-date"></div><div><label class="form-label">Heure</label><input type="time" class="form-input" id="ev-time" value="10:00"></div></div>
    <div class="form-row"><label class="form-label">Note (optionnel)</label><input type="text" class="form-input" id="ev-note" placeholder="Ex : Montre réf. 1234"></div>
    <div class="form-row"><label class="form-label">Participants</label><div class="members-grid">
      <div class="m-opt" data-m="Guillaume" onclick="toggleMember(this)"><div class="m-av av-g">GU</div><span>Guillaume</span></div>
      <div class="m-opt" data-m="Arthur" onclick="toggleMember(this)"><div class="m-av av-a">AR</div><span>Arthur</span></div>
      <div class="m-opt" data-m="Kim" onclick="toggleMember(this)"><div class="m-av av-k">KI</div><span>Kim</span></div>
    </div></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeAddModal()">Annuler</button><button class="btn-save" onclick="saveEvent()">Enregistrer</button></div>
  </div>
</div>

<div class="overlay" id="detail-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:inline-block;font-size:11px;padding:2px 10px;border-radius:99px;border:0.5px solid var(--green-border-strong);color:var(--muted);margin-bottom:.6rem;" id="d-type"></div>
    <div style="font-size:18px;font-weight:500;color:var(--text);margin-bottom:.75rem;" id="d-title"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem;font-size:13px;"><i class="ti ti-calendar" style="color:var(--muted);font-size:15px"></i><span id="d-date"></span></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem;font-size:13px;"><i class="ti ti-clock" style="color:var(--muted);font-size:15px"></i><span id="d-time"></span></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem;font-size:13px;" id="d-note-row"><i class="ti ti-note" style="color:var(--muted);font-size:15px"></i><span id="d-note"></span></div>
    <div style="display:flex;align-items:flex-start;gap:8px;font-size:13px;"><i class="ti ti-users" style="color:var(--muted);font-size:15px;margin-top:2px"></i><div style="display:flex;gap:8px;flex-wrap:wrap;" id="d-members"></div></div>
    <button class="del-btn" onclick="deleteEvent()"><i class="ti ti-trash" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>Supprimer</button>
    <div class="modal-actions" style="margin-top:.75rem;"><button class="btn-cancel" onclick="closeDetailModal()">Fermer</button><button class="btn-save" onclick="editEvent()">Modifier</button></div>
  </div>
</div>

<script type="module">
  import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const MONTHS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const MM={ Guillaume:{av:"av-g",initials:"GU",dot:"dot-g",bar:"bar-g"}, Arthur:{av:"av-a",initials:"AR",dot:"dot-a",bar:"bar-a"}, Kim:{av:"av-k",initials:"KI",dot:"dot-k",bar:"bar-k"} };
  let currentDate=new Date(); currentDate.setDate(1);
  let activeFilter="all", events={}, selectedMembers=new Set(), editingId=null, detailId=null;

  initAuth((app) => {
    const db=getDatabase(app);
    onValue(ref(db,"events"), snap => { events=snap.val()||{}; render(); });
    onValue(ref(db,"posts"), snap => { posts=snap.val()||{}; render(); });

    function render(){
      const y=currentDate.getFullYear(), m=currentDate.getMonth();
      document.getElementById("month-label").textContent=MONTHS[m]+" "+y;
      const today=new Date();
      let startDow=new Date(y,m,1).getDay(); if(startDow===0) startDow=7;
      const dim=new Date(y,m+1,0).getDate(), dip=new Date(y,m,0).getDate();
      const filtered=Object.entries(events).filter(([,e])=>activeFilter==="all"||(e.members||[]).includes(activeFilter));
      const grid=document.getElementById("days-grid"); grid.innerHTML="";
      for(let i=startDow-1;i>0;i--){ const c=document.createElement("div"); c.className="day-cell other-month"; c.innerHTML=`<div class="day-num">${dip-i+1}</div>`; grid.appendChild(c); }
      for(let d=1;d<=dim;d++){
        const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const de=filtered.filter(([,e])=>e.date===ds);
        const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
        const c=document.createElement("div"); c.className="day-cell"+(isT?" today":"");
        const dayPosts=Object.values(posts).filter(p=>p.date===ds&&p.status!=='published');
        const instraDot=dayPosts.length?`<div class="dot dot-insta"></div>`:'';
        const dots=[...new Set(de.flatMap(([,e])=>e.members||[]))].map(mn=>MM[mn]?`<div class="dot ${MM[mn].dot}"></div>`:"").join("")+instraDot;
        c.innerHTML=`<div class="day-num">${d}</div>${dots?`<div class="dots">${dots}</div>`:""}`;
        grid.appendChild(c);
      }
      const monthEvs=filtered.filter(([,e])=>{const d=new Date(e.date);return d.getFullYear()===y&&d.getMonth()===m;}).sort((a,b)=>(a[1].date+a[1].time).localeCompare(b[1].date+b[1].time));
      document.getElementById("section-label").textContent=monthEvs.length?`${monthEvs.length} événement${monthEvs.length>1?"s":""} ce mois`:"Aucun événement";
      const list=document.getElementById("events-list"); list.innerHTML="";
      const monthPosts=Object.entries(posts).filter(([,p])=>{const d=new Date(p.date);return d.getFullYear()===y&&d.getMonth()===m&&p.status!=='published';}).sort((a,b)=>a[1].date.localeCompare(b[1].date));
      if(!monthEvs.length&&!monthPosts.length){list.innerHTML='<div class="empty">Aucun événement ce mois</div>';return;}
      monthEvs.forEach(([id,e])=>{
        const ms=e.members||[]; const bc=ms.length>1?"bar-multi":(MM[ms[0]]?.bar||"bar-g");
        const ds=new Date(e.date+"T12:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
        const avs=ms.map(mn=>MM[mn]?`<div class="ev-av ${MM[mn].av}">${MM[mn].initials}</div>`:"").join("");
        const c=document.createElement("div"); c.className="event-card"; c.onclick=()=>openDetail(id);
        c.innerHTML=`<div class="event-bar ${bc}"></div><div class="event-body"><div class="event-title">${e.title}</div><div class="event-meta"><i class="ti ti-clock" style="font-size:11px"></i>${e.time}·${ds}<span class="type-badge">${e.type}</span></div></div><div class="ev-avatars">${avs}</div>`;
        list.appendChild(c);
      });
      // Render instagram posts
      monthPosts.forEach(([id,p])=>{
        const ds=new Date(p.date+'T12:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
        const ms=p.members||[];const avs=ms.map(mn=>MM[mn]?`<div class="ev-av ${MM[mn].av}">${MM[mn].initials}</div>`:'').join('');
        const statusLabel={planned:'En préparation',ready:'Prêt à publier'}[p.status]||p.status;
        const c=document.createElement('div');c.className='event-card';
        c.style.borderLeft='3px solid #c0607a';
        c.innerHTML=`<div class="event-bar" style="background:#c0607a"></div><div class="event-body"><div class="event-title"><i class="ti ti-brand-instagram" style="font-size:12px;color:#c0607a;margin-right:4px"></i>${p.title}</div><div class="event-meta"><i class="ti ti-clock" style="font-size:11px"></i>${p.time}·${ds}<span class="type-badge insta">${statusLabel}</span></div></div><div class="ev-avatars">${avs}</div>`;
        c.onclick=()=>window.location.href='instagram.html';
        list.appendChild(c);
      });
    }

    window.changeMonth=(dir)=>{currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+dir,1);render();};
    window.setFilter=(el,key)=>{activeFilter=key;document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));el.classList.add("active");render();};
    window.openAddModal=()=>{editingId=null;selectedMembers=new Set();document.getElementById("modal-title").textContent="Nouvel événement";["ev-title","ev-note"].forEach(i=>document.getElementById(i).value="");document.getElementById("ev-date").value=new Date().toISOString().split("T")[0];document.getElementById("ev-time").value="10:00";document.getElementById("ev-type").value="Rendez-vous client";document.querySelectorAll(".m-opt").forEach(o=>o.classList.remove("sel"));document.getElementById("add-overlay").classList.add("open");};
    window.closeAddModal=()=>document.getElementById("add-overlay").classList.remove("open");
    window.toggleMember=(el)=>{const m=el.dataset.m;if(selectedMembers.has(m)){selectedMembers.delete(m);el.classList.remove("sel");}else{selectedMembers.add(m);el.classList.add("sel");}};
    window.saveEvent=async()=>{const t=document.getElementById("ev-title").value.trim();const d=document.getElementById("ev-date").value;if(!t||!d||selectedMembers.size===0){alert("Remplis le titre, la date et au moins un participant.");return;}const p={title:t,type:document.getElementById("ev-type").value,date:d,time:document.getElementById("ev-time").value,note:document.getElementById("ev-note").value.trim(),members:[...selectedMembers]};if(editingId)await set(ref(db,"events/"+editingId),p);else await push(ref(db,"events"),p);closeAddModal();};
    window.openDetail=(id)=>{detailId=id;const e=events[id];if(!e)return;document.getElementById("d-type").textContent=e.type;document.getElementById("d-title").textContent=e.title;document.getElementById("d-date").textContent=new Date(e.date+"T12:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});document.getElementById("d-time").textContent=e.time;const nr=document.getElementById("d-note-row");if(e.note){document.getElementById("d-note").textContent=e.note;nr.style.display="flex";}else nr.style.display="none";document.getElementById("d-members").innerHTML=(e.members||[]).map(m=>MM[m]?`<div style="display:flex;align-items:center;gap:6px;"><div class="ev-av ${MM[m].av}" style="width:22px;height:22px;font-size:9px;border:none;">${MM[m].initials}</div>${m}</div>`:"").join("");document.getElementById("detail-overlay").classList.add("open");};
    window.closeDetailModal=()=>document.getElementById("detail-overlay").classList.remove("open");
    window.deleteEvent=async()=>{if(!detailId||!confirm("Supprimer cet événement ?"))return;await remove(ref(db,"events/"+detailId));closeDetailModal();};
    window.editEvent=()=>{if(!detailId)return;const e=events[detailId];editingId=detailId;selectedMembers=new Set(e.members||[]);document.getElementById("modal-title").textContent="Modifier l'événement";document.getElementById("ev-title").value=e.title;document.getElementById("ev-type").value=e.type;document.getElementById("ev-date").value=e.date;document.getElementById("ev-time").value=e.time;document.getElementById("ev-note").value=e.note||"";document.querySelectorAll(".m-opt").forEach(o=>o.classList.toggle("sel",selectedMembers.has(o.dataset.m)));closeDetailModal();document.getElementById("add-overlay").classList.add("open");};
  });
</script>
</body>
</html>
