  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --green: #162715; --green-mid: #2e4a2c; --muted: rgba(22,39,21,0.46); --border: rgba(22,39,21,0.18); --bg: #fff; }
    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem;
    }
    .top { text-align: center; margin-bottom: 2.5rem; }
    .logo-img { height: 64px; width: auto; margin-bottom: 1rem; }
    .brand { font-family: "DM Serif Display", serif; font-size: 26px; color: var(--green); letter-spacing: 0.01em; }
    .brand-tagline { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
    .card {
      width: 100%; max-width: 340px;
      border: 0.5px solid var(--border); border-radius: 16px;
      padding: 1.75rem 1.5rem 2rem;
    }
    .card-title { font-size: 14px; font-weight: 500; color: var(--green); margin-bottom: 1.5rem; letter-spacing: 0.02em; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    input {
      width: 100%; padding: 10px 12px; font-size: 14px;
      font-family: "DM Sans", sans-serif;
      border: 0.5px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--green); outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--green); }
    .btn {
      width: 100%; margin-top: 0.5rem; padding: 11px;
      background: var(--green); color: #fff; border: none;
      border-radius: 8px; font-family: "DM Sans", sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      letter-spacing: 0.02em; transition: background 0.15s;
    }
    .btn:hover { background: var(--green-mid); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .err { font-size: 12px; color: #b94040; text-align: center; margin-top: 0.75rem; min-height: 16px; }
    .footer { font-size: 11px; color: var(--muted); margin-top: 2.5rem; letter-spacing: 0.06em; }
    .divider { width: 32px; height: 0.5px; background: var(--border); margin: 0 auto 2.5rem; }
  </style>
</head>

  </div>
  <div class="footer">Accès réservé à l'équipe</div>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    onAuthStateChanged(auth, u => { if (u) window.location.href = "dashboard.html"; });
    window.login = async () => {
      const email = document.getElementById("email").value.trim();
      const pw = document.getElementById("password").value;
      const btn = document.getElementById("btn");
      const err = document.getElementById("err");
      err.textContent = ""; if (!email || !pw) { err.textContent = "Remplis tous les champs."; return; }
      btn.disabled = true; btn.textContent = "Connexion…";
      try { await signInWithEmailAndPassword(auth, email, pw); }
      catch(e) {
        const m = { "auth/invalid-credential": "Email ou mot de passe incorrect.", "auth/too-many-requests": "Trop de tentatives." };
        err.textContent = m[e.code] || "Erreur de connexion.";
        btn.disabled = false; btn.textContent = "Se connecter";
      }
    };
    document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") window.login(); });
  </script>
</body>
</html>
